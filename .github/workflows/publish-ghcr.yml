name: Publish GHCR images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push uhtcp-server (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/uhtcp-server:${{ github.ref_name != '' && github.ref_name || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=UHTCP server multi-arch image
            org.opencontainers.image.licenses=MIT
          outputs: |
            type=image,name=server,annotation-index.org.opencontainers.image.description=UHTCP server multi-arch image

      - name: Build and push uhtcp-core (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.uhtcp-core
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/uhtcp-core:${{ github.ref_name != '' && github.ref_name || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=UHTCP core runtime multi-arch image
            org.opencontainers.image.licenses=MIT
          outputs: |
            type=image,name=core,annotation-index.org.opencontainers.image.description=UHTCP core multi-arch image

      - name: Verify pushed images
        run: |
          echo "Pushed uhtcp-server and uhtcp-core images"

      # The previous inline Dockerfile build used an older Rust image
      # and caused edition parsing failures. The repository's
      # `Dockerfile.uhtcp-core` is used above with `docker/build-push-action`.
