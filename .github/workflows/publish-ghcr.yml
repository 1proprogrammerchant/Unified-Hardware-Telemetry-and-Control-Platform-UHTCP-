name: Publish GHCR images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push uhtcp-server (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/uhtcp-server:${{ github.ref_name != '' && github.ref_name || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=UHTCP server multi-arch image
            org.opencontainers.image.licenses=MIT
          outputs: |
            type=image,name=server,annotation-index.org.opencontainers.image.description=UHTCP server multi-arch image

      - name: Build and push uhtcp-core (multi-arch)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.uhtcp-core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/uhtcp-core:${{ github.ref_name != '' && github.ref_name || github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=UHTCP core runtime multi-arch image
            org.opencontainers.image.licenses=MIT
          outputs: |
            type=image,name=core,annotation-index.org.opencontainers.image.description=UHTCP core multi-arch image

      - name: Verify pushed images
        run: |
          echo "Pushed uhtcp-server and uhtcp-core images"

      - name: Build and push uhtcp-core (multi-arch)
        env:
          IMAGE_CORE_NAME: ghcr.io/${{ github.repository_owner }}/uhtcp-core
          TAG: ${{ github.ref_name != '' && github.ref_name || github.sha }}
        run: |
          docker buildx create --use --bootstrap
          cat > Dockerfile.uhtcp-core <<'EOF'
          FROM rust:1.70-slim AS builder
          RUN apt-get update && apt-get install -y build-essential pkg-config libssl-dev ca-certificates
          WORKDIR /usr/src/uhtcp
          COPY core/ /usr/src/uhtcp/
          RUN cargo build --release --manifest-path /usr/src/uhtcp/Cargo.toml

          FROM debian:bookworm-slim
          RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
          COPY --from=builder /usr/src/uhtcp/target/release/uhtcp-core /usr/local/bin/uhtcp-core
          ENTRYPOINT ["/usr/local/bin/uhtcp-core"]
          EOF

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f Dockerfile.uhtcp-core \
            -t "$IMAGE_CORE_NAME:$TAG" \
            --push .

      - name: Verify pushed core image
        run: |
          echo "Pushed $IMAGE_CORE_NAME:$TAG"
