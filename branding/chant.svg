<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-labelledby="title desc">
  <title id="title">chant — bird logo</title>
  <desc id="desc">A stylized bird photo with a polished wordmark that cycles through type styles.</desc>

  <defs>
    <!-- softened white highlight for the bird -->
    <radialGradient id="whiteShine" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- rounded mask for the image to make it feel like a card -->
    <clipPath id="imgClip"><rect x="12" y="12" width="536" height="396" rx="20" ry="20"/></clipPath>

    <!-- soft drop shadow under the image -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18" />
    </filter>

    <!-- subtle inner vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </radialGradient>

    <!-- polished type styles and animations -->
    <style><![CDATA[
      .word { font-size: 78px; dominant-baseline: middle; text-anchor: start; fill: #0f2130; paint-order: stroke fill; }
      .word-stroke { stroke: rgba(255,255,255,0.55); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }

      .w1 { font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif; font-weight:700; }
      .w2 { font-family: 'Impact', 'Arial Black', sans-serif; font-weight:900; letter-spacing:1px; }
      .w3 { font-family: 'Times New Roman', 'Georgia', serif; font-weight:600; font-style:normal; }
      .w4 { font-family: 'Brush Script MT', cursive; font-weight:600; }
      .w5 { font-family: 'Verdana', Geneva, sans-serif; font-weight:700; }

      /* Crossfade + gentle scale for a modern feel */
      @keyframes crossFadeScale {
        0%   { opacity: 0; transform: translateY(6px) scale(0.985); }
        8%   { opacity: 1; transform: translateY(0px) scale(1); }
        36%  { opacity: 1; transform: translateY(0px) scale(1); }
        44%  { opacity: 0; transform: translateY(-6px) scale(0.985); }
        100% { opacity: 0; }
      }

      .word { opacity:0; will-change: opacity, transform; animation: crossFadeScale 6s cubic-bezier(.2,.9,.2,1) infinite; }
      .w1 { animation-delay: 0s; }
      .w2 { animation-delay: 1.2s; }
      .w3 { animation-delay: 2.4s; }
      .w4 { animation-delay: 3.6s; }
      .w5 { animation-delay: 4.8s; }

      .tag { font-family: 'Segoe UI', Roboto, Arial, sans-serif; font-size: 14px; fill: #4a5b6a; }
      .float { animation: floatBird 6s ease-in-out infinite; transform-origin: 50% 50%; }

      @keyframes floatBird { 0% { transform: translateY(0px);} 50% { transform: translateY(-4px);} 100% { transform: translateY(0px);} }
    ]]></style>
  </defs>

  <!-- page background (transparent) -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- left: bird image card with subtle effects -->
  <g id="visual" transform="translate(20,12)">
    <rect x="0" y="0" width="560" height="396" rx="22" ry="22" fill="#fff" opacity="0" />
    <g clip-path="url(#imgClip)" filter="url(#dropShadow)">
      <image href="chant_bird.png" x="12" y="12" width="536" height="396" preserveAspectRatio="xMidYMid slice" class="float" />
      <!-- white highlight to lift tonal midtones -->
      <rect x="12" y="12" width="536" height="396" fill="url(#whiteShine)" opacity="0.45" />
      <!-- subtle inner vignette -->
      <rect x="12" y="12" width="536" height="396" fill="url(#vignette)" />
    </g>
  </g>

  <!-- right: animated, polished wordmark -->
  <g id="wordmark" transform="translate(600,210)">
    <!-- layered text for nicer edges (stroke + fill) -->
    <text class="word word-stroke w1" x="0" y="0">chant</text>
    <text class="word w1" x="0" y="0">chant</text>

    <text class="word word-stroke w2" x="0" y="0">chant</text>
    <text class="word w2" x="0" y="0">chant</text>

    <text class="word word-stroke w3" x="0" y="0">chant</text>
    <text class="word w3" x="0" y="0">chant</text>

    <text class="word word-stroke w4" x="0" y="0">chant</text>
    <text class="word w4" x="0" y="0">chant</text>

    <text class="word word-stroke w5" x="0" y="0">chant</text>
    <text class="word w5" x="0" y="0">chant</text>

    <!-- small tagline below -->
    <text class="tag" x="0" y="74">simple • lightweight • friendly</text>
  </g>
</svg>
