<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" role="img" aria-labelledby="title desc">
  <title id="title">chant — light variant</title>
  <desc id="desc">Light variant of the chant logo for light backgrounds.</desc>
  <defs>
    <clipPath id="imgClip"><rect x="12" y="12" width="536" height="396" rx="20" ry="20"/></clipPath>
    <radialGradient id="whiteShine" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#fff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.06"/>
    </radialGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18" />
    </filter>
    <style><![CDATA[
      .word { font-size: 78px; dominant-baseline: middle; text-anchor: start; fill: #0f2130; }
      .word-stroke { stroke: rgba(255,255,255,0.55); stroke-width: 2; stroke-linejoin: round; }
      .tag { font-family: 'Segoe UI', Roboto, Arial, sans-serif; font-size: 14px; fill: #4a5b6a; }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>
  <g transform="translate(20,12)">
    <g clip-path="url(#imgClip)" filter="url(#dropShadow)">
      <image href="chant_bird.png" x="12" y="12" width="536" height="396" preserveAspectRatio="xMidYMid slice" />
      <rect x="12" y="12" width="536" height="396" fill="url(#whiteShine)" opacity="0.45" />
      <rect x="12" y="12" width="536" height="396" fill="url(#vignette)" />
    </g>
  </g>
  <g transform="translate(600,210)">
    <text class="word word-stroke" x="0" y="0">chant</text>
    <text class="word" x="0" y="0">chant</text>
    <text class="tag" x="0" y="74">simple • lightweight • friendly</text>
  </g>
</svg>
